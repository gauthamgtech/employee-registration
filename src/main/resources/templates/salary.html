<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Salary</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script>

function calculateSalary(){

    const gross = parseFloat(document.getElementById("gross").value) || 0;

    const basic = gross * 0.60;

    const hra = basic * 0.40;

    const variable = gross - basic - hra;

    const total = basic + hra + variable;

    document.getElementById("basic").value = basic.toFixed(2);

    document.getElementById("hra").value = hra.toFixed(2);

    document.getElementById("variable").value = variable.toFixed(2);

    document.getElementById("total").value = total.toFixed(2);

}


function updateEmployeeName(select){

    const selectedOption = select.options[select.selectedIndex];

    const empNameInput = document.getElementById("empName");

    if(empNameInput){
        empNameInput.value = selectedOption.text;
    }

}

</script>

</head>

<body>

<div class="container mt-5">

<div class="card p-4 mx-auto" style="max-width:600px;">

<h2 class="text-center mb-4">Employee Salary</h2>

<form th:action="@{/salary/save}" th:object="${salary}" method="post">


<div class="mb-3">

<label class="form-label">Select Employee <span style="color:red">*</span></label>

<select th:field="*{empId}" class="form-control"
onchange="updateEmployeeName(this)" required>

<option value="">-- Select Employee --</option>

<option th:each="emp : ${employees}"
        th:value="${emp.empId}"
        th:text="${emp.name}">
</option>

</select>

</div>


<div class="mb-3">

<label class="form-label">Employee Name</label>

<input type="text"
th:field="*{empName}"
id="empName"
class="form-control"
readonly>

</div>


<div class="mb-3">

<label class="form-label">Gross Salary <span style="color:red">*</span></label>

<input type="number"
step="0.01"
min="0"
th:field="*{gross}"
id="gross"
class="form-control"
oninput="calculateSalary()"
required>

</div>


<div class="mb-3">

<label class="form-label">Basic (60% of Gross)</label>

<input type="number"
th:field="*{basic}"
id="basic"
class="form-control"
readonly>

</div>


<div class="mb-3">

<label class="form-label">HRA (40% of Basic)</label>

<input type="number"
th:field="*{hra}"
id="hra"
class="form-control"
readonly>

</div>


<div class="mb-3">

<label class="form-label">Variable Allowance (Balance)</label>

<input type="number"
th:field="*{variableAllowance}"
id="variable"
class="form-control"
readonly>

</div>


<div class="mb-3">

<label class="form-label">Total</label>

<input type="number"
th:field="*{total}"
id="total"
class="form-control"
readonly>

</div>


<div class="d-grid mt-4">

<button type="submit" class="btn btn-success">
Save Salary
</button>

</div>

</form>

</div>

</div>

</body>

</html>
