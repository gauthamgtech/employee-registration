<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Employee Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarButtons" 
                aria-controls="navbarButtons" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarButtons">
            <div class="d-flex flex-wrap">
                <a th:href="@{/employees/register}" class="btn btn-primary btn-sm me-2 mb-1">Add Employee</a>
                <a th:href="@{/salary}" class="btn btn-success btn-sm me-2 mb-1">Salary Page</a>
                <a th:href="@{/logout}" class="btn btn-danger btn-sm mb-1">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-4">
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Employee List</h3>

            <div class="table-responsive">
                <table class="table table-striped table-hover table-bordered align-middle text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>Employee ID</th>
                            <th>Photo</th>
                            <th>Name</th>
                            <th>Gender</th>
                            <th>Designation</th>
                            <th>Mobile</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${employees == null or #lists.isEmpty(employees)}">
                            <td colspan="7" class="text-muted fst-italic">No employees found. Please add an employee.</td>
                        </tr>

                        <tr th:each="emp : ${employees}">
                            <td th:text="${emp.empId}"></td>
                            <td>
                                <img th:if="${emp.photo != null}" th:src="@{'/uploads/' + ${emp.photo}}" 
                                     class="rounded-circle" style="width:50px; height:50px;" alt="Employee Photo"/>
                                <span th:if="${emp.photo == null}" class="text-muted">No Photo</span>
                            </td>
                            <td th:text="${emp.name}"></td>
                            <td><span class="badge bg-info text-dark" th:text="${emp.gender}"></span></td>
                            <td><span class="badge bg-secondary" th:text="${emp.designation}"></span></td>
                            <td th:text="${emp.mobile}"></td>
                            <td th:text="${emp.email}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
