<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Employee Attendance</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

<div class="card p-4 mx-auto" style="max-width:500px;">

<h2 class="text-center mb-4">Employee Attendance</h2>

<form th:action="@{/attendance/save}"
      th:object="${attendance}"
      method="post">

<div class="mb-3">

<label class="form-label">
Employee ID <span style="color:red">*</span>
</label>

<input type="text"
       th:field="*{employeeId}"
       class="form-control"
       readonly>

</div>

<div class="mb-3">

<label class="form-label">
Per Days <span style="color:red">*</span>
</label>

<input type="number"
       th:field="*{perDays}"
       class="form-control"
       placeholder="Enter number of working days"
       required>

</div>

<div class="d-grid mt-4">

<button type="submit"
        class="btn btn-success">
Save Attendance
</button>

</div>

</form>

</div>

</div>

</body>
</html>
