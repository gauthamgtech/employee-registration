<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Employee Paysheet</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

.slip{
width:650px;
margin:auto;
border:2px solid #000;
padding:30px;
background:#fff;
}

.title{
text-align:center;
font-weight:bold;
margin-bottom:25px;
}

.company{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="slip">

<div class="company">
ABC Technologies Pvt Ltd
</div>

<h4 class="title">Employee Salary Slip</h4>

<div class="row mb-3">

<div class="col-6">
<strong>Employee ID :</strong>
<span th:text="${employee.empId}"></span>
</div>

<div class="col-6">
<strong>Employee Name :</strong>
<span th:text="${employee.name}"></span>
</div>

</div>

<div class="row mb-3">

<div class="col-6">
<strong>Working Days :</strong>
<span th:text="${attendance.perDays}"></span>
</div>

<div class="col-6">
<strong>Designation :</strong>
<span th:text="${employee.designation}"></span>
</div>

</div>

<table class="table table-bordered mt-3">

<thead class="table-dark">

<tr>
<th>Pay Component</th>
<th class="text-end">Amount</th>
</tr>

</thead>

<tbody>

<tr>
<td>Basic</td>
<td class="text-end" th:text="${salary.basic}"></td>
</tr>

<tr>
<td>HRA</td>
<td class="text-end" th:text="${salary.hra}"></td>
</tr>

<tr>
<td>Variable Allowance</td>
<td class="text-end" th:text="${salary.variableAllowance}"></td>
</tr>

<tr class="table-success">

<td><strong>Total Pay</strong></td>

<td class="text-end">
<strong th:text="${payAmount}"></strong>
</td>

</tr>

</tbody>

</table>

<p class="mt-3">

<strong>Amount in Words :</strong>

<span th:text="${amountInWords}"></span>

</p>

<div class="text-center mt-4">

<button onclick="window.print()" class="btn btn-primary">
Print PDF
</button>

<a th:href="@{'/paysheet/excel/' + ${employee.empId}}"
class="btn btn-success">
Download Excel
</a>

</div>

</div>

</div>

</body>
</html>
