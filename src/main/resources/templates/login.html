<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Login</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>


<div class="container-fluid bg-light p-2 mb-3">
    <div class="d-flex justify-content-between">
        <span>User Management System</span>
        <span th:if="${session.loggedInUser != null}">
            Logged in as: <strong th:text="${session.loggedInUser}"></strong>
            <a th:href="@{/logout}" class="btn btn-sm btn-danger ms-2">Logout</a>
        </span>
    </div>
</div>

<div class="container mt-5">
    <div class="card p-4 mx-auto shadow" style="max-width:450px;">
        <h2 class="text-center mb-4">User Login</h2>

        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">User ID</label>
                <input type="text"
                       name="userId"
                       class="form-control"
                       placeholder="Enter User ID"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter Password"
                       required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Login
                </button>
            </div>
        </form>

        <div class="text-center mt-3">
            <p>Don't have an account?</p>
            <a th:href="@{/register}" class="btn btn-outline-success btn-sm">
                Register
            </a>
        </div>
    </div>
</div>

</body>
</html>
