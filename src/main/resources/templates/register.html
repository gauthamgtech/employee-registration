<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Registration</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container-fluid bg-light p-2 mb-3">
    <div class="d-flex justify-content-between">
        <span>User Management System</span>
        <span th:if="${session.loggedInUser != null}">
            Logged in as: <strong th:text="${session.loggedInUser}"></strong>
            <a th:href="@{/logout}" class="btn btn-sm btn-danger ms-2">Logout</a>
        </span>
    </div>
</div>

<div class="container mt-3">

    <div class="card p-4 mx-auto" style="max-width: 500px;">

        <h2 class="text-center mb-4">User Registration</h2>
		
		<div th:if="${errorMessage}" class="alert alert-danger text-center">
		    <span th:text="${errorMessage}"></span>
		</div>

        <form th:action="@{/register}"
              th:object="${user}"
              method="post"
              enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">User ID <span style="color:red">*</span></label>
                <input type="text" th:field="*{userId}" class="form-control">
                <p class="text-danger" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></p>
            </div>

            <div class="mb-3">
                <label class="form-label">Password <span style="color:red">*</span></label>
                <input type="password" th:field="*{password}" class="form-control">
                <p class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </div>

			<div class="mb-3">
			    <label class="form-label">Mobile Number <span style="color:red">*</span></label>
			    <input type="text"
			           th:field="*{mobile}"
			           class="form-control"
			           maxlength="10"
			           placeholder="Enter 10-digit mobile number"
			           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
			           required>
			    <p class="text-danger" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></p>
			</div>

			<div class="mb-3">
			    <label class="form-label">Email <span style="color:red">*</span></label>
			    <input type="email"
			           th:field="*{email}"
			           class="form-control"
			           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
			           placeholder="Enter valid email (e.g., user@example.com)"
			           required>
			    <p class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
			</div>

            <div class="mb-3">
                <label class="form-label">Upload Photo</label>
                <input type="file" name="photoFile" class="form-control">
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/login}" class="btn btn-outline-secondary me-3">Login</a>
                <button type="submit" class="btn btn-success">Register</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
